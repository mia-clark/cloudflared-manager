# ============================================================================
# 本地源码构建专用 compose 文件
#
#   docker compose -f deploy/docker-compose.yml up --build -d
#
# Dockerfile 内置 node:20 + go 多阶段构建 — npm install/build 都在镜像内完成，
# 宿主机无需 Node 环境，也不用先跑任何 npm 命令。
# ============================================================================

services:
  cfdmgrd:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: cloudflared-manager:${VERSION:-dev}
    container_name: cfdmgrd
    restart: unless-stopped
    # cloudflared connectors are OUTBOUND-only (QUIC/HTTP2 to the Cloudflare
    # edge) and need no inbound ports or NAT hole punching, so host networking
    # is NOT required. We keep it only so the manager's web port is reachable
    # without an explicit ports: mapping. For stricter isolation switch to the
    # default bridge network and add e.g. ports: ["8080:8080"].
    network_mode: host
    environment:
      CFDM_API_TOKEN: ${CFDM_API_TOKEN:?api token required (set in .env)}
      CFDM_HTTP_ADDR: ":${CFDM_HTTP_PORT:-8080}"
      CFDM_CORS_ORIGINS: ${CFDM_CORS_ORIGINS:-*}
      CFDM_LOG_LEVEL: ${CFDM_LOG_LEVEL:-info}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "/usr/local/bin/cfdmgrd", "health", "-addr", "http://127.0.0.1:${CFDM_HTTP_PORT:-8080}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
